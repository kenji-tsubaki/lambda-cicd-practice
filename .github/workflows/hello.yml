name: Hello Workflow

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Hello
        run: echo "Hello GitHub Actions!"

      - name: Show Date
        run: date

      - name: Show Python Version
        run: python3 --version

      - name: Show pwd
        run: pwd

      - name: Show Files
        run: ls -la
     
      - name: Recursive List
        run: find .
